name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run typecheck

      - run: bun run test

      - run: bun run build

      - name: Check dist is up to date
        run: |
          git diff --exit-code dist/ || (echo "dist/ is out of date. Run 'bun run build' and commit." && exit 1)
